<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>midnight · time & date</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0b0b;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      padding: 1.5rem;
      color: #f0f2f5;
    }

    .container {
      max-width: 900px;
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ---- date row (top) ---- */
    .date-row {
      font-weight: 400;
      letter-spacing: 0.04em;
      margin-bottom: 3.5rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: baseline;
      gap: 0.4rem 1.2rem;
      background: rgba(255, 255, 255, 0.02);
      padding: 0.6rem 2rem;
      border-radius: 80px;
      border: 1px solid rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(2px);
    }

    .date-item {
      font-size: 1.9rem;
      font-weight: 500;
      color: #e8ecf5;
      text-shadow: 0 0 6px rgba(200, 215, 255, 0.08);
    }

    .date-sep {
      color: #3a4357;
      font-weight: 300;
      font-size: 1.6rem;
      padding: 0 0.1rem;
    }

    .date-item.weekday {
      font-weight: 400;
      color: #a8b9da;
      font-size: 1.6rem;
      background: rgba(255, 255, 255, 0.02);
      padding: 0.1rem 1.2rem;
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.02);
    }

    .date-item.day {
      font-weight: 600;
      color: #ffffff;
    }

    .date-item.month-year {
      font-weight: 500;
      color: #d3def5;
    }

    /* ---- time (middle) ---- */
    .time-main {
      font-size: 9.5rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.06em;
      line-height: 1;
      color: #f2f6ff;
      text-shadow: 0 0 20px rgba(140, 180, 255, 0.08);
      background: rgba(255, 255, 255, 0.01);
      padding: 0.4rem 1.2rem;
      border-radius: 60px;
      margin-bottom: 1.2rem;
      font-family: 'Inter', 'SF Mono', 'Fira Code', monospace;
    }

    .time-24-label {
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      color: #5f6f8a;
      text-transform: uppercase;
      background: rgba(255, 255, 255, 0.02);
      padding: 0.2rem 1.8rem;
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.02);
      display: inline-block;
    }

    /* optional 12h helper (tiny, subtle) */
    .time-12-helper {
      margin-top: 0.8rem;
      font-size: 0.9rem;
      font-weight: 300;
      color: #5a6a84;
      letter-spacing: 0.08em;
      background: rgba(255, 255, 255, 0.01);
      padding: 0.15rem 1.2rem;
      border-radius: 60px;
      border: 1px solid rgba(255, 255, 255, 0.02);
    }

    /* responsive */
    @media (max-width: 650px) {
      .date-item { font-size: 1.4rem; }
      .date-item.weekday { font-size: 1.2rem; }
      .date-sep { font-size: 1.2rem; }
      .time-main { font-size: 5.8rem; letter-spacing: 0.04em; }
      .date-row { gap: 0.2rem 0.8rem; padding: 0.5rem 1.2rem; }
    }

    @media (max-width: 430px) {
      .time-main { font-size: 4.2rem; }
      .date-item { font-size: 1.1rem; }
      .date-item.weekday { font-size: 1rem; }
      .date-sep { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- date row: Month, Day, Year, Day of Week -->
    <div class="date-row" id="dateRow">
      <span class="date-item month-year" id="monthYear">January 2026</span>
      <span class="date-sep">·</span>
      <span class="date-item day" id="dayNumber">19</span>
      <span class="date-sep">·</span>
      <span class="date-item weekday" id="dayOfWeek">Monday</span>
    </div>

    <!-- time: 24h 00:00:00 -->
    <div class="time-main" id="time24">00:00:00</div>
    <div class="time-24-label">24‑hour</div>

    <!-- small 12h hint (optional, shows both formats) -->
    <div class="time-12-helper" id="time12helper">⏱ 12h · 00:00:00 AM</div>

  </div>

  <script>
    (function() {
      "use strict";

      // DOM refs
      const monthYearEl = document.getElementById('monthYear');
      const dayNumberEl = document.getElementById('dayNumber');
      const dayOfWeekEl = document.getElementById('dayOfWeek');
      const time24El = document.getElementById('time24');
      const time12helper = document.getElementById('time12helper');

      // helpers
      const pad2 = (num) => String(num).padStart(2, '0');

      // update date + time
      function updateDateTime() {
        const now = new Date();

        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
        const weekdays = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

        const month = monthNames[now.getMonth()];
        const year = now.getFullYear();
        const day = now.getDate();
        const weekday = weekdays[now.getDay()];

        monthYearEl.textContent = `${month} ${year}`;
        dayNumberEl.textContent = day;
        dayOfWeekEl.textContent = weekday;

        // 24h time: HH:MM:SS
        const h24 = now.getHours();
        const min = now.getMinutes();
        const sec = now.getSeconds();
        const time24Str = `${pad2(h24)}:${pad2(min)}:${pad2(sec)}`;
        time24El.textContent = time24Str;

        // 12h helper (optional)
        let h12 = h24 % 12;
        if (h12 === 0) h12 = 12;
        const ampm = h24 >= 12 ? 'PM' : 'AM';
        const time12Str = `${pad2(h12)}:${pad2(min)}:${pad2(sec)} ${ampm}`;
        time12helper.textContent = `⏱ 12h · ${time12Str}`;
      }

      // ---- init ----
      updateDateTime();
      setInterval(updateDateTime, 1000);

    })();
  </script>
</body>
</html>
