<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local Time | Made By Damien Mehlbaum</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0b0b;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      padding: 1.5rem;
      color: #f0f2f5;
    }

    .container {
      max-width: 1000px;
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      min-height: 80vh;
    }

    .date-row {
      font-weight: 400;
      letter-spacing: 0.04em;
      margin-bottom: 3rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: baseline;
      gap: 0.4rem 1.2rem;
      background: rgba(255, 255, 255, 0.02);
      padding: 0.6rem 2rem;
      border-radius: 80px;
      border: 1px solid rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(2px);
    }

    .date-item {
      font-size: 1.9rem;
      font-weight: 500;
      color: #e8ecf5;
      text-shadow: 0 0 6px rgba(200, 215, 255, 0.08);
    }

    .date-sep {
      color: #3a4357;
      font-weight: 300;
      font-size: 1.6rem;
      padding: 0 0.1rem;
    }

    .date-item.weekday {
      font-weight: 400;
      color: #a8b9da;
      font-size: 1.6rem;
      background: rgba(255, 255, 255, 0.02);
      padding: 0.1rem 1.2rem;
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.02);
    }

    .date-item.day {
      font-weight: 600;
      color: #ffffff;
    }

    .date-item.month-year {
      font-weight: 500;
      color: #d3def5;
    }

    .time-main {
      font-size: 9.5rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.06em;
      line-height: 1;
      color: #f2f6ff;
      text-shadow: 0 0 20px rgba(140, 180, 255, 0.08);
      background: rgba(255, 255, 255, 0.01);
      padding: 0.4rem 1.2rem;
      border-radius: 60px;
      margin-bottom: 0.8rem;
      font-family: 'Inter', 'SF Mono', 'Fira Code', monospace;
    }

    .time-24-label {
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      color: #5f6f8a;
      text-transform: uppercase;
      background: rgba(255, 255, 255, 0.02);
      padding: 0.2rem 1.8rem;
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.02);
      display: inline-block;
    }

    .time-12-helper {
      margin-top: 0.8rem;
      font-size: 0.9rem;
      font-weight: 300;
      color: #5a6a84;
      letter-spacing: 0.08em;
      background: rgba(255, 255, 255, 0.01);
      padding: 0.15rem 1.2rem;
      border-radius: 60px;
      border: 1px solid rgba(255, 255, 255, 0.02);
    }

    .bottom-grid {
      margin-top: 3.5rem;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1.8fr 1fr;
      gap: 1.5rem;
      align-items: stretch;
    }

    .sunset-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.03);
      border-radius: 28px;
      padding: 1.2rem 0.8rem;
      backdrop-filter: blur(2px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.2rem;
    }

    .sunset-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #6a7b98;
      font-weight: 300;
    }

    .sunset-value {
      font-size: 2rem;
      font-weight: 500;
      color: #e8eefb;
      letter-spacing: 0.02em;
      font-variant-numeric: tabular-nums;
    }

    .sunset-sub {
      font-size: 0.75rem;
      color: #6f82a0;
      font-weight: 300;
      margin-top: 0.1rem;
    }

    .progress-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.03);
      border-radius: 28px;
      padding: 1.2rem 1.5rem;
      backdrop-filter: blur(2px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 1.2rem;
    }

    .progress-item {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      font-weight: 300;
      color: #a0b2d0;
      letter-spacing: 0.04em;
    }

    .progress-bar-bg {
      width: 100%;
      height: 5px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #6f9eff, #b6d0ff);
      border-radius: 12px;
      transition: width 0.3s ease;
    }

    .progress-bar-fill.week {
      background: linear-gradient(90deg, #9f7aff, #d4bfff);
    }

    .moon-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.03);
      border-radius: 28px;
      padding: 1.2rem 0.8rem;
      backdrop-filter: blur(2px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.1rem;
    }

    .moon-icon {
      font-size: 3.2rem;
      line-height: 1;
      filter: drop-shadow(0 0 6px rgba(200, 220, 255, 0.08));
    }

    .moon-phase-name {
      font-size: 1rem;
      font-weight: 400;
      color: #d2def5;
      letter-spacing: 0.02em;
    }

    .moon-illumination {
      font-size: 0.7rem;
      color: #7a8dac;
      font-weight: 300;
    }

    @media (max-width: 750px) {
      .bottom-grid {
        grid-template-columns: 1fr;
        gap: 1rem;
        margin-top: 2.5rem;
      }
      .time-main { font-size: 6.5rem; }
      .date-item { font-size: 1.4rem; }
      .date-item.weekday { font-size: 1.2rem; }
      .date-sep { font-size: 1.2rem; }
      .date-row { gap: 0.2rem 0.8rem; padding: 0.5rem 1.2rem; }
      .sunset-value { font-size: 1.8rem; }
    }

    @media (max-width: 480px) {
      .time-main { font-size: 4.2rem; }
      .date-item { font-size: 1.1rem; }
      .date-item.weekday { font-size: 1rem; }
      .date-sep { font-size: 1rem; }
      .moon-icon { font-size: 2.6rem; }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="date-row">
      <span class="date-item month-year" id="monthYear">January 2026</span>
      <span class="date-sep">·</span>
      <span class="date-item day" id="dayNumber">19</span>
      <span class="date-sep">·</span>
      <span class="date-item weekday" id="dayOfWeek">Monday</span>
    </div>

    <div class="time-main" id="time24">00:00:00</div>
    <div class="time-24-label">24‑hour</div>
    <div class="time-12-helper" id="time12helper">⏱ 12h · 00:00:00 AM</div>

    <div class="bottom-grid">
      <div class="sunset-card">
        <div class="sunset-label">☀️ sunset duration</div>
        <div class="sunset-value" id="sunsetDuration">--:--</div>
        <div class="sunset-sub" id="sunsetSub">daylight</div>
      </div>

      <div class="progress-card">
        <div class="progress-item">
          <div class="progress-header">
            <span>day progress</span>
            <span id="dayPercent">0%</span>
          </div>
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="dayFill" style="width:0%;"></div>
          </div>
        </div>
        <div class="progress-item">
          <div class="progress-header">
            <span>week progress</span>
            <span id="weekPercent">0%</span>
          </div>
          <div class="progress-bar-bg">
            <div class="progress-bar-fill week" id="weekFill" style="width:0%;"></div>
          </div>
        </div>
      </div>

      <div class="moon-card">
        <div class="moon-icon" id="moonIcon">🌕</div>
        <div class="moon-phase-name" id="moonPhaseName">Full Moon</div>
        <div class="moon-illumination" id="moonIllumination">100% illuminated</div>
      </div>
    </div>

  </div>

  <script>
    (function() {
      "use strict";

      const monthYearEl = document.getElementById('monthYear');
      const dayNumberEl = document.getElementById('dayNumber');
      const dayOfWeekEl = document.getElementById('dayOfWeek');
      const time24El = document.getElementById('time24');
      const time12helper = document.getElementById('time12helper');

      const sunsetDurationEl = document.getElementById('sunsetDuration');
      const sunsetSubEl = document.getElementById('sunsetSub');

      const dayPercentEl = document.getElementById('dayPercent');
      const dayFillEl = document.getElementById('dayFill');
      const weekPercentEl = document.getElementById('weekPercent');
      const weekFillEl = document.getElementById('weekFill');

      const moonIconEl = document.getElementById('moonIcon');
      const moonPhaseNameEl = document.getElementById('moonPhaseName');
      const moonIlluminationEl = document.getElementById('moonIllumination');

      const pad2 = (num) => String(num).padStart(2, '0');

      function getMoonPhase(date) {
        const ref = new Date(Date.UTC(2000, 0, 6, 18, 14));
        const diff = (date.getTime() - ref.getTime()) / 1000;
        const days = diff / 86400;
        const lunarCycle = 29.53058867;
        const phase = (days % lunarCycle) / lunarCycle;
        return phase;
      }

      function getMoonInfo(date) {
        const phase = getMoonPhase(date);
        const illumination = Math.round((1 - Math.cos(phase * 2 * Math.PI)) / 2 * 100);
        let name = '';
        let icon = '';

        const p = phase;
        if (p < 0.0625 || p >= 0.9375) { name = 'New Moon'; icon = '🌑'; }
        else if (p >= 0.0625 && p < 0.1875) { name = 'Waxing Crescent'; icon = '🌒'; }
        else if (p >= 0.1875 && p < 0.3125) { name = 'First Quarter'; icon = '🌓'; }
        else if (p >= 0.3125 && p < 0.4375) { name = 'Waxing Gibbous'; icon = '🌔'; }
        else if (p >= 0.4375 && p < 0.5625) { name = 'Full Moon'; icon = '🌕'; }
        else if (p >= 0.5625 && p < 0.6875) { name = 'Waning Gibbous'; icon = '🌖'; }
        else if (p >= 0.6875 && p < 0.8125) { name = 'Last Quarter'; icon = '🌗'; }
        else if (p >= 0.8125 && p < 0.9375) { name = 'Waning Crescent'; icon = '🌘'; }
        return { name, icon, illumination };
      }

      function getSunsetDuration(date) {
        const lat = 40.0;
        const doy = Math.floor((date - new Date(date.getFullYear(), 0, 0)) / 86400000);
    
        const declination = 23.44 * Math.sin((doy - 81) * (2 * Math.PI / 365));
        const latRad = lat * Math.PI / 180;
        const decRad = declination * Math.PI / 180;
        const cosHourAngle = -Math.tan(latRad) * Math.tan(decRad);
        let dayLength = 12;
        if (cosHourAngle > -1 && cosHourAngle < 1) {
          const hourAngle = Math.acos(cosHourAngle);
          dayLength = 2 * hourAngle * (180 / Math.PI) / 15;
        } else if (cosHourAngle <= -1) {
          dayLength = 24;
        } else {
          dayLength = 0;
        }
   
        const sunsetHours = dayLength / 2;
        const hours = Math.floor(sunsetHours);
        const minutes = Math.round((sunsetHours - hours) * 60);
        return { hours, minutes, dayLength };
      }

      function updateAll() {
        const now = new Date();

        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
        const weekdays = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        monthYearEl.textContent = `${monthNames[now.getMonth()]} ${now.getFullYear()}`;
        dayNumberEl.textContent = now.getDate();
        dayOfWeekEl.textContent = weekdays[now.getDay()];

        const h24 = now.getHours();
        const min = now.getMinutes();
        const sec = now.getSeconds();
        time24El.textContent = `${pad2(h24)}:${pad2(min)}:${pad2(sec)}`;

        let h12 = h24 % 12;
        if (h12 === 0) h12 = 12;
        const ampm = h24 >= 12 ? 'PM' : 'AM';
        time12helper.textContent = `⏱ 12h · ${pad2(h12)}:${pad2(min)}:${pad2(sec)} ${ampm}`;

        const sunset = getSunsetDuration(now);
        const hh = String(sunset.hours).padStart(2, '0');
        const mm = String(sunset.minutes).padStart(2, '0');
        sunsetDurationEl.textContent = `${hh}:${mm}`;
        const totalDaylight = sunset.dayLength.toFixed(1);
        sunsetSubEl.textContent = `${totalDaylight}h daylight`;

        const startOfDay = new Date(now);
        startOfDay.setHours(0, 0, 0, 0);
        const endOfDay = new Date(now);
        endOfDay.setHours(23, 59, 59, 999);
        const dayElapsed = now.getTime() - startOfDay.getTime();
        const dayTotal = endOfDay.getTime() - startOfDay.getTime();
        const dayPct = Math.min(100, (dayElapsed / dayTotal) * 100);
        dayPercentEl.textContent = `${Math.round(dayPct)}%`;
        dayFillEl.style.width = `${dayPct}%`;

        const dayOfWeek = now.getDay();
        const mondayOffset = (dayOfWeek === 0) ? 6 : dayOfWeek - 1;
        const startOfWeek = new Date(now);
        startOfWeek.setDate(now.getDate() - mondayOffset);
        startOfWeek.setHours(0, 0, 0, 0);
        const endOfWeek = new Date(startOfWeek);
        endOfWeek.setDate(startOfWeek.getDate() + 7);
        endOfWeek.setHours(0, 0, 0, 0);
        const weekElapsed = now.getTime() - startOfWeek.getTime();
        const weekTotal = endOfWeek.getTime() - startOfWeek.getTime();
        let weekPct = Math.min(100, (weekElapsed / weekTotal) * 100);
        weekPct = Math.min(100, weekPct);
        weekPercentEl.textContent = `${Math.round(weekPct)}%`;
        weekFillEl.style.width = `${weekPct}%`;

        const moon = getMoonInfo(now);
        moonIconEl.textContent = moon.icon;
        moonPhaseNameEl.textContent = moon.name;
        moonIlluminationEl.textContent = `${moon.illumination}% illuminated`;
      }

      updateAll();
      setInterval(updateAll, 1000);

      document.addEventListener('visibilitychange', () => {
        if (!document.hidden) {
          updateAll();
        }
      });

    })();
  </script>
</body>
</html>
